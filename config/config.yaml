# DiffSTOCK India Configuration File
# All hyperparameters - single source of truth

data:
  start_date: "2015-01-01"
  end_date: "2026-02-26"
  lookback_window: 20
  n_features: 16
  corr_threshold: 0.25       # was 0.4
  nifty500_url: "https://archives.nseindia.com/content/indices/ind_nifty500list.csv"

  # Data quality thresholds
  max_missing_pct: 0.15
  min_trading_days: 500
  max_zero_volume_pct: 0.10
  min_adv_crores: 5.0

  # Data cleaning
  max_ffill_days: 5
  outlier_threshold: 0.20
  nifty_index_threshold: 0.05

model:
  d_model: 96                # was 192 — too large for 637K samples
  n_heads_mrt: 8             # was 12 — must divide d_model evenly (96/8=12 ✅)
  n_layers_dicem: 4          # was 5
  n_layers_mrt: 2            # was 4
  diffusion_T: 100           # was 150
  beta_start: 0.0001         # Increased from 0.00001
  beta_end: 0.015            # Increased from 0.01
  dropout: 0.30              # was 0.18 — higher dropout needed for smaller model

training:
  batch_size: 16
  learning_rate: 0.0001      # INCREASED 3.3x from 0.00003 - key fix
  weight_decay: 0.01
  drop_extreme_label_pct: 0.025
  use_cs_zscore_labels: true
  max_epochs: 200            # Increased from 150
  patience: 25               # Increased from 20
  grad_clip: 0.8             # Increased from 0.5
  ema_decay: 0.995
  warmup_steps: 800          # Increased from 500
  noise_augmentation: 0.015  # Increased from 0.01

  # Train/val/test split dates
  train_end: "2022-12-31"
  val_start: "2023-01-01"
  val_end: "2024-06-30"
  test_start: "2024-07-01"

evaluation:
  primary_metric: "IC"
  report_every: 5
  top_k: 20
  rebalance_freq: "weekly"
  risk_free_rate: 0.065

  # Indian market transaction costs
  transaction_costs:
    brokerage: 0.0003
    stt_buy: 0.001
    stt_sell: 0.001
    exchange: 0.0000335
    sebi: 0.000001
    gst: 0.18
    stamp: 0.00015
    slippage: 0.002

paths:
  root: "/Users/siddartha/Documents/Personal/stock_model/diffstock_india"
  raw_data: "data/raw"
  processed_data: "data/processed"
  dataset: "data/dataset"
  checkpoints: "checkpoints"
  logs: "logs"
  results: "results"

seed: 42
