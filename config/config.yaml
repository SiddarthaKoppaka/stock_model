# DiffSTOCK India Configuration File
# All hyperparameters - single source of truth

data:
  start_date: "2005-01-01"
  end_date: "2026-02-26"
  lookback_window: 20
  n_features: 16
  label_horizon: 5           # predict 5-day (weekly) forward return
  rebalance_freq: weekly     # for consistency
  corr_threshold: 0.25       # was 0.4
  nifty500_url: "https://archives.nseindia.com/content/indices/ind_nifty500list.csv"

  # Data quality thresholds
  max_missing_pct: 0.15
  min_trading_days: 500
  max_zero_volume_pct: 0.10
  min_adv_crores: 5.0

  # Data cleaning
  max_ffill_days: 5
  outlier_threshold: 0.20
  nifty_index_threshold: 0.05

model:
  d_model: 192               # was 96 — restore original capacity
  n_heads_mrt: 12            # was 8 — (192/12=16 ✅)
  n_layers_dicem: 5          # was 4
  n_layers_mrt: 3            # was 2 — deeper relational reasoning
  diffusion_T: 150           # was 100
  beta_start: 0.0001
  beta_end: 0.02             # was 0.015 — slightly wider noise range
  dropout: 0.10              # was 0.15 — ease off during harder multi-regime learning

training:
  batch_size: 16
  learning_rate: 0.0001      # reduced from 0.0003 — more data = more gradient signal per epoch
  weight_decay: 0.01         # increased from 0.005 — more regularization for wider distribution
  drop_extreme_label_pct: 0.025
  use_cs_zscore_labels: true
  max_epochs: 250            # was 200 — plateau hit at 105, give more room
  patience: 50               # was 25 — don't stop early, 5-day IC is noisier
  grad_clip: 1.0             # was 0.8
  ema_decay: 0.999           # was 0.995 — smoother EMA for noisier 5-day labels
  warmup_steps: 3000         # was 2000 — longer warmup for larger dataset
  noise_augmentation: 0.02   # was 0.015

  # Train/val/test split dates
  train_end: "2022-12-31"
  val_start: "2023-01-01"
  val_end: "2024-06-30"
  test_start: "2024-07-01"

evaluation:
  primary_metric: "IC"
  report_every: 5
  top_k: 20
  rebalance_freq: "weekly"
  risk_free_rate: 0.065

  # Indian market transaction costs
  transaction_costs:
    brokerage: 0.0003
    stt_buy: 0.001
    stt_sell: 0.001
    exchange: 0.0000335
    sebi: 0.000001
    gst: 0.18
    stamp: 0.00015
    slippage: 0.002

paths:
  root: "/Users/siddartha/Documents/Personal/stock_model/diffstock_india"
  raw_data: "data/raw"
  processed_data: "data/processed"
  dataset: "data/dataset"
  checkpoints: "checkpoints"
  logs: "logs"
  results: "results"

seed: 42
