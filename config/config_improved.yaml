# DiffSTOCK India Configuration - Improved for Better Performance
# Based on analysis of poor IC (0.0008) with conservative settings

data:
  start_date: "2015-01-01"
  end_date: "2026-02-26"
  lookback_window: 20
  n_features: 16
  corr_threshold: 0.4
  nifty500_url: "https://archives.nseindia.com/content/indices/ind_nifty500list.csv"

  # Data quality thresholds
  max_missing_pct: 0.15
  min_trading_days: 500
  max_zero_volume_pct: 0.10
  min_adv_crores: 5.0

  # Data cleaning
  max_ffill_days: 5
  outlier_threshold: 0.20
  nifty_index_threshold: 0.05

model:
  d_model: 256              # INCREASED from 128 - more capacity
  n_heads_mrt: 16           # INCREASED from 8 - more attention heads
  n_layers_dicem: 6         # INCREASED from 4 - deeper temporal modeling
  n_layers_mrt: 4           # INCREASED from 3 - deeper relational modeling
  diffusion_T: 100          # DECREASED from 200 - simpler diffusion
  beta_start: 0.0001        # INCREASED from 0.00001 - more aggressive start
  beta_end: 0.02            # INCREASED from 0.01 - wider noise range
  dropout: 0.20             # INCREASED from 0.15 - prevent overfitting with larger model

training:
  batch_size: 16            # DECREASED from 32 - better gradients with larger model
  learning_rate: 0.0001     # INCREASED from 0.00003 - was too conservative
  weight_decay: 0.01        # INCREASED from 0.001 - regularize larger model
  max_epochs: 200           # INCREASED from 150 - give more time
  patience: 30              # INCREASED from 20 - don't stop too early
  grad_clip: 1.0            # INCREASED from 0.5 - allow larger updates
  ema_decay: 0.995
  warmup_steps: 1000        # INCREASED from 500 - slower warmup for higher LR
  noise_augmentation: 0.02  # INCREASED from 0.01 - more augmentation

  # Train/val/test split dates
  train_end: "2022-12-31"
  val_start: "2023-01-01"
  val_end: "2024-06-30"
  test_start: "2024-07-01"

evaluation:
  primary_metric: "IC"
  report_every: 5
  top_k: 20
  rebalance_freq: "weekly"
  risk_free_rate: 0.065

  # Indian market transaction costs
  transaction_costs:
    brokerage: 0.0003
    stt_buy: 0.001
    stt_sell: 0.001
    exchange: 0.0000335
    sebi: 0.000001
    gst: 0.18
    stamp: 0.00015
    slippage: 0.002

paths:
  root: "/Users/siddartha/Documents/Personal/stock_model/diffstock_india"
  raw_data: "data/raw"
  processed_data: "data/processed"
  dataset: "data/dataset"
  checkpoints: "checkpoints"
  logs: "logs"
  results: "results"

seed: 42
